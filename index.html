<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e0f1a">
<title>Zigzy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zigzy">
<style>
  :root{
    --bg1:#0e0f1a; --bg2:#161a2e;
    --path:#27e0c9; --path2:#1ba8d6;
    --ball:#ffd34e; --gem:#ff4e8a;
    --ink:#eef2ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg1);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  #game{display:block;width:100vw;height:100dvh;}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;text-align:center;color:var(--ink);
    padding:24px;pointer-events:none;}
  .overlay.show{pointer-events:auto;}
  .hidden{display:none!important;}
  .title{font-size:64px;font-weight:900;letter-spacing:-2px;
    background:linear-gradient(120deg,var(--path),var(--ball));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 6px 24px rgba(39,224,201,.35));}
  .sub{font-size:16px;opacity:.7;font-weight:600;}
  .big{font-size:88px;font-weight:900;letter-spacing:-3px;line-height:1;}
  .lbl{font-size:13px;letter-spacing:3px;opacity:.55;font-weight:700;text-transform:uppercase;}
  .row{display:flex;gap:28px;align-items:flex-end;}
  .stat{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .stat .v{font-size:40px;font-weight:800;}
  .btn{pointer-events:auto;margin-top:6px;border:none;cursor:pointer;
    font-size:18px;font-weight:800;color:#0e0f1a;
    background:linear-gradient(120deg,var(--path),#8ef7e6);
    padding:16px 40px;border-radius:999px;
    box-shadow:0 10px 30px rgba(39,224,201,.4);transition:transform .1s;}
  .btn:active{transform:scale(.94);}
  .btn.ghost{background:rgba(255,255,255,.08);color:var(--ink);box-shadow:none;}
  .hint{font-size:15px;opacity:.6;font-weight:600;display:flex;align-items:center;gap:8px;}
  .tap-anim{width:46px;height:46px;border-radius:50%;border:3px solid var(--ink);
    opacity:.0;animation:tap 1.6s infinite;}
  @keyframes tap{0%{transform:scale(.6);opacity:.0}30%{opacity:.8}60%{transform:scale(1.1);opacity:0}100%{opacity:0}}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;
    padding-top:max(18px,env(safe-area-inset-top));pointer-events:none;}
  #score{font-size:54px;font-weight:900;color:var(--ink);
    text-shadow:0 4px 18px rgba(0,0,0,.5);opacity:0;transition:opacity .2s;}
  #coins{position:fixed;top:max(22px,env(safe-area-inset-top));right:18px;
    display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px;color:var(--ball);
    opacity:0;transition:opacity .2s;}
  .show-hud #score,.show-hud #coins{opacity:1;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--gem);box-shadow:0 0 10px var(--gem);}
  .new{font-size:14px;font-weight:800;color:var(--ball);letter-spacing:1px;
    border:1.5px solid var(--ball);border-radius:999px;padding:4px 12px;}
  #soundBtn{position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;z-index:20;
    width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.08);color:#fff;font-size:20px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:transform .1s;}
  #soundBtn:active{transform:scale(.9);}
  .gembar{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--ball);}
  .shop-title{font-size:32px;font-weight:900;letter-spacing:-1px;}
  .shop-tabs{display:flex;gap:8px;}
  .shop-tab{border:none;cursor:pointer;font-size:15px;font-weight:800;padding:10px 20px;border-radius:999px;
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);transition:transform .1s;}
  .shop-tab:active{transform:scale(.95);}
  .shop-tab.active{background:var(--path);color:#0e0f1a;}
  .shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:360px;
    max-height:56vh;overflow-y:auto;padding:4px;-webkit-overflow-scrolling:touch;}
  .skin{background:rgba(255,255,255,.06);border-radius:18px;padding:14px 8px;
    display:flex;flex-direction:column;align-items:center;gap:9px;border:2px solid transparent;}
  .skin.active{border-color:var(--path);background:rgba(39,224,201,.12);}
  .skin .prev{width:42px;height:42px;border-radius:50%;box-shadow:0 4px 14px rgba(0,0,0,.45);}
  .skin .nm{font-size:13px;font-weight:700;opacity:.9;}
  .skin .act{font-size:12px;font-weight:800;padding:7px 14px;border-radius:999px;border:none;
    cursor:pointer;background:var(--path);color:#0e0f1a;min-width:64px;}
  .skin .act.owned{background:rgba(255,255,255,.16);color:#fff;}
  .skin .act.active{background:transparent;color:var(--path);}
  .skin .act.locked{background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);cursor:default;}
  #zoneBanner{position:fixed;top:34%;left:0;right:0;text-align:center;z-index:15;
    font-size:30px;font-weight:900;letter-spacing:1px;color:#fff;pointer-events:none;
    opacity:0;text-shadow:0 4px 22px rgba(0,0,0,.6);}
  #zoneBanner.show{animation:zb 1.7s ease-out forwards;}
  .cont-ring{position:relative;width:148px;height:148px;border:none;background:none;cursor:pointer;padding:0;transition:transform .1s;}
  .cont-ring:active{transform:scale(.94);}
  .cont-ring svg{display:block;transform:rotate(-90deg);}
  #contProg{stroke:var(--path);}
  .cont-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  #contNum{font-size:48px;font-weight:900;color:#fff;line-height:1;}
  .cont-go{font-size:13px;font-weight:800;color:var(--path);letter-spacing:1px;}
  .cont-note{font-size:12px;opacity:.55;font-weight:600;}
  .btn-row{display:flex;gap:10px;}
  .btn.small{padding:13px 22px;font-size:15px;box-shadow:none;}
  .lb-name{display:flex;gap:8px;width:100%;max-width:340px;}
  .lb-name input{flex:1;font-size:16px;font-weight:700;padding:12px 14px;border-radius:12px;border:none;
    background:rgba(255,255,255,.1);color:#fff;outline:none;}
  .lb-name input::placeholder{color:rgba(255,255,255,.4);}
  .lb-name .btn{padding:12px 20px;}
  .lb-list{width:100%;max-width:340px;max-height:48vh;overflow-y:auto;
    display:flex;flex-direction:column;gap:6px;font-weight:700;-webkit-overflow-scrolling:touch;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.05);}
  .lb-row.me{background:rgba(39,224,201,.18);border:1px solid rgba(39,224,201,.4);}
  .lb-rank{width:26px;text-align:center;opacity:.55;font-size:14px;}
  .lb-nm{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-sc{font-weight:900;color:var(--ball);}
  .lb-empty{opacity:.6;font-weight:600;padding:20px;text-align:center;}
  @keyframes zb{0%{opacity:0;transform:translateY(16px) scale(.9)}
    18%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1}
    100%{opacity:0;transform:translateY(-10px)}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<button id="soundBtn" aria-label="Ton an/aus">🔊</button>
<div id="hud"><div id="score">0</div></div>
<div id="coins"><span class="dot"></span><span id="coinval">0</span></div>
<div id="zoneBanner"></div>

<!-- Start screen -->
<div class="overlay show" id="startScreen">
  <div class="title">Zigzy</div>
  <div class="sub">Ein Tap. Bleib auf dem Pfad.</div>
  <button class="btn" id="playBtn">Spielen</button>
  <div class="btn-row">
    <button class="btn ghost small" id="shopBtnStart">Musik 🎵</button>
    <button class="btn ghost small" id="lbBtnStart">🏆 Top</button>
  </div>
  <div class="hint"><div class="tap-anim"></div>Tippen = Richtung wechseln</div>
</div>

<!-- Game over screen -->
<div class="overlay hidden" id="overScreen">
  <div id="newBest" class="new hidden">NEUER REKORD! 🎉</div>
  <div class="lbl">Score</div>
  <div class="big" id="finalScore">0</div>
  <div class="row">
    <div class="stat"><div class="v" id="finalBest">0</div><div class="lbl">Best</div></div>
    <div class="stat"><div class="v" id="finalCoins">0</div><div class="lbl">Gems</div></div>
  </div>
  <div class="lb-name hidden" id="overName">
    <input id="overNameInput" maxlength="16" placeholder="Name für die Rangliste" autocomplete="off" />
    <button class="btn" id="overNameSave">🏆</button>
  </div>
  <div class="sub hidden" id="overLbMsg">🏆 In der Rangliste!</div>
  <button class="btn" id="retryBtn">Nochmal</button>
  <button class="btn ghost" id="shareBtn">Score teilen</button>
  <div class="btn-row">
    <button class="btn ghost small" id="shopBtnOver">Musik 🎵</button>
    <button class="btn ghost small" id="lbBtnOver">🏆 Top</button>
  </div>
</div>

<!-- Shop screen -->
<div class="overlay hidden" id="shopScreen">
  <div class="gembar"><span class="dot"></span><span id="shopGems">0</span> Gems</div>
  <div class="shop-tabs">
    <button class="shop-tab active" id="tabSkins">🎨 Skins</button>
    <button class="shop-tab" id="tabMusic">🎵 Musik</button>
  </div>
  <div class="shop-grid" id="shopGrid"></div>
  <button class="btn ghost" id="shopClose">Zurück</button>
</div>

<!-- Continue (revive) screen -->
<div class="overlay hidden" id="continueScreen">
  <div class="lbl">Weiterspielen?</div>
  <button id="continueBtn" class="cont-ring" aria-label="Weiter">
    <svg width="148" height="148" viewBox="0 0 148 148">
      <circle cx="74" cy="74" r="54" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="9"/>
      <circle id="contProg" cx="74" cy="74" r="54" fill="none" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="339.29" stroke-dashoffset="0"></circle>
    </svg>
    <span class="cont-center"><span id="contNum">3</span><span class="cont-go">▶ Weiter</span></span>
  </button>
  <div class="cont-note">📺 In der App später: kurzes Video ansehen</div>
  <div class="sub" id="contScore">Score 0</div>
  <button class="btn ghost" id="giveupBtn">Aufgeben</button>
</div>

<!-- Leaderboard screen -->
<div class="overlay hidden" id="lbScreen">
  <div class="shop-title">🏆 Rangliste</div>
  <div class="lb-name">
    <input id="nameInput" maxlength="16" placeholder="Dein Name" autocomplete="off" />
    <button class="btn" id="nameSave">OK</button>
  </div>
  <div class="lb-list" id="lbList">Lädt…</div>
  <button class="btn ghost" id="lbClose">Zurück</button>
</div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); window.addEventListener('resize',resize);

// ---- Config ----
const SQRT2 = Math.SQRT2;
const DIRS = { 1:{x:1/SQRT2,y:1/SQRT2}, '-1':{x:-1/SQRT2,y:1/SQRT2} };
const PATH_W = 74;          // corridor width (wider = more forgiving)
const BALL_R = 13;
const BASE_SPEED = 205;     // px/sec (calmer start)
const MAX_SPEED = 470;
const SEG_MIN = 70, SEG_MAX = 240;  // base bounds; eased by progress in extendPath

// ---- State ----
let state='ready';
let path=[];          // centerline points {x,y, gem:bool, got:bool, dir}
let lastDir=1;
let ball={x:0,y:0,dir:1};
let trail=[];
let particles=[];
let speed=BASE_SPEED;
let score=0, coins=0, best=+(localStorage.getItem('zigzy_best')||0);
let shake=0;
let fall=0;            // death fall animation
let lastZone=0;        // for zone-change banner
let continued=0;       // continues used this run
let reviveGrace=0;     // brief invincibility after a continue
let reviveSlow=0;      // slow-motion ease-in timer after a continue
let bgDots=[];
let camX=0,camY=0;

const $=id=>document.getElementById(id);

// ---- skins & gem currency (persistent) ----
const SKINS=[
  {id:'classic', name:'Classic', cost:0,   ball:'#ffd34e', trail:'#ffd34e'},
  {id:'mint',    name:'Minze',   cost:30,  ball:'#27e0c9', trail:'#8ef7e6'},
  {id:'rose',    name:'Rosé',    cost:60,  ball:'#ff4e8a', trail:'#ff9cc2'},
  {id:'violet',  name:'Violett', cost:120, ball:'#a06bff', trail:'#cdb0ff'},
  {id:'lime',    name:'Lime',    cost:200, ball:'#b6ff3d', trail:'#dcff96'},
  {id:'neon',    name:'Neon',    cost:150, ball:'#19f0ff', trail:'#9bfcff', fx:'glow'},
  {id:'fire',    name:'Feuer',   cost:300, ball:'#ff5b2e', trail:'#ffb03d', fx:'fire'},
  {id:'galaxy',  name:'Galaxis', cost:450, ball:'#b98cff', trail:'#e6d4ff', fx:'sparkle'},
  {id:'rainbow', name:'Regenbogen', cost:700, ball:'#ff4e8a', trail:'#ffffff', fx:'rainbow'},
  {id:'gold',    name:'Gold',    cost:0, premium:true, ball:'#ffe14d', trail:'#fff6c0', fx:'glow'},
];
let totalGems = +(localStorage.getItem('zigzy_gems')||0);
let owned = (()=>{ try{ return JSON.parse(localStorage.getItem('zigzy_owned')||'["classic"]'); }catch(e){ return ['classic']; } })();
let selSkin = localStorage.getItem('zigzy_skin')||'classic';
function saveShop(){
  localStorage.setItem('zigzy_gems',totalGems);
  localStorage.setItem('zigzy_owned',JSON.stringify(owned));
  localStorage.setItem('zigzy_skin',selSkin);
}
function curSkin(){ return SKINS.find(s=>s.id===selSkin)||SKINS[0]; }
function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }

// ---- music tracks (buyable with gems, like skins) ----
const TRACKS=[
  {id:'classic', name:'Classic', cost:0,   color:'#27e0c9', bpm:112, roots:[220.00,174.61,261.63,196.00], arp:'triangle', bass:'triangle', cutoff:3200},
  {id:'chill',   name:'Chill',   cost:80,  color:'#7ad7ff', bpm:88,  roots:[196.00,146.83,220.00,164.81], arp:'sine',     bass:'sine',     cutoff:1500},
  {id:'drive',   name:'Drive',   cost:170, color:'#ff8a3d', bpm:132, roots:[220.00,261.63,196.00,293.66], arp:'sawtooth', bass:'triangle', cutoff:2600},
  {id:'retro',   name:'8-Bit',   cost:300, color:'#b6ff3d', bpm:120, roots:[261.63,233.08,196.00,220.00], arp:'square',   bass:'square',   cutoff:5200},
  {id:'dark',    name:'Dark',    cost:480, color:'#a06bff', bpm:100, roots:[164.81,123.47,146.83,110.00], arp:'triangle', bass:'sine',     cutoff:1250},
];
let ownedTracks = (()=>{ try{ return JSON.parse(localStorage.getItem('zigzy_tracks')||'["classic"]'); }catch(e){ return ['classic']; } })();
let selTrack = localStorage.getItem('zigzy_track')||'classic';
function curTrack(){ return TRACKS.find(t=>t.id===selTrack)||TRACKS[0]; }
function saveTracks(){ localStorage.setItem('zigzy_tracks',JSON.stringify(ownedTracks)); localStorage.setItem('zigzy_track',selTrack); }

// ---- visual zones: the line + background evolve as you progress (loops forever) ----
const THEMES=[
  {name:'Aqua',   a:[39,224,201],  b:[27,168,214],  bg1:[22,26,46], bg2:[11,12,22]},
  {name:'Sunset', a:[255,138,76],  b:[255,78,138],  bg1:[42,20,40], bg2:[16,8,20]},
  {name:'Neon',   a:[166,107,255], b:[40,170,255],  bg1:[22,16,48], bg2:[10,8,26]},
  {name:'Forest', a:[182,255,61],  b:[39,224,160],  bg1:[16,34,24], bg2:[7,16,12]},
  {name:'Magma',  a:[255,91,46],   b:[255,206,61],  bg1:[42,14,14], bg2:[18,6,6]},
  {name:'Ice',    a:[120,220,255], b:[160,140,255], bg1:[18,28,48], bg2:[8,12,26]},
];
const ZONE_LEN=40;   // score points per zone
const MAX_CONT=1;    // free continues per run (the future rewarded-ad slot)
const REVIVE_SLOW=1.2;  // seconds of slow-motion ease-in after a continue
// ---- global leaderboard (Supabase Data API) ----
const SUPA_URL='https://pvoodzyqvosqmfpiqmdv.supabase.co';
const SUPA_KEY='sb_publishable_m-ACNZpjp7oZg1W0b5mCeQ_FPhFj4Zp';
let playerName=(localStorage.getItem('zigzy_name')||'').slice(0,16);
let pendingScore=0;
function lerp3(c1,c2,t){ return [Math.round(c1[0]+(c2[0]-c1[0])*t), Math.round(c1[1]+(c2[1]-c1[1])*t), Math.round(c1[2]+(c2[2]-c1[2])*t)]; }
function themeColors(){
  const z=score/ZONE_LEN, base=Math.floor(z);
  const i=base%THEMES.length, j=(base+1)%THEMES.length, frac=z-base;
  const t = frac<0.75 ? 0 : (frac-0.75)/0.25;   // hold the zone, then morph near its end
  const A=THEMES[i], B=THEMES[j];
  return { a:lerp3(A.a,B.a,t), b:lerp3(A.b,B.b,t), bg1:lerp3(A.bg1,B.bg1,t), bg2:lerp3(A.bg2,B.bg2,t), zoneAbs:base };
}

function seedBgDots(){
  bgDots=[];
  for(let i=0;i<60;i++) bgDots.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.4,s:Math.random()*.4+.1});
}
seedBgDots();

function extendPath(){
  // ensure path has points well above the ball
  while(path.length<2 || path[path.length-1].y < ball.y + H*1.4){
    const last=path[path.length-1] || {x:0,y:-40};
    if(path.length===0){ path.push({x:0,y:-40,gem:false,got:false}); continue; }
    lastDir*=-1;
    // ease difficulty in: longer segments early, gradually shorter
    const approxScore=Math.max(0, last.y/14);
    const ease=Math.min(1, approxScore/130);
    const minL=125 - 55*ease;        // 125 → 70
    const maxL=SEG_MAX - 20*ease;    // 240 → 220
    const len=minL+Math.random()*(maxL-minL);
    const d=DIRS[lastDir];
    const np={x:last.x+d.x*len, y:last.y+d.y*len, gem:Math.random()<0.28, got:false};
    path.push(np);
  }
  // prune behind
  while(path.length>3 && path[1].y < ball.y - H){ path.shift(); }
}

function reset(){
  path=[]; lastDir=1; ball={x:0,y:0,dir:1};
  trail=[]; particles=[]; speed=BASE_SPEED; score=0; coins=0; shake=0; fall=0;
  camX=0; camY=0; lastZone=0; continued=0; reviveGrace=0; reviveSlow=0;
  // ball starts EXACTLY on the centerline; first segment runs in ball.dir (=1)
  path.push({x:0,y:0,gem:false,got:false});
  const d=DIRS[1];
  path.push({x:d.x*170,y:d.y*170,gem:false,got:false}); lastDir=1;
  extendPath();
}

function startGame(){
  reset();
  state='playing';
  $('startScreen').classList.remove('show'); $('startScreen').classList.add('hidden');
  $('overScreen').classList.add('hidden'); $('overScreen').classList.remove('show');
  document.body.classList.add('show-hud');
  if(soundOn) Music.start();
}

function tap(){
  if(state==='ready'){ startGame(); return; }
  if(state==='playing'){ ball.dir*=-1; beep(560,0.04); }
}

// ---- nearest distance from ball to centerline (check nearby segments) ----
function distToPath(){
  let min=1e9;
  for(let i=1;i<path.length;i++){
    const a=path[i-1], b=path[i];
    const dx=b.x-a.x, dy=b.y-a.y;
    const L2=dx*dx+dy*dy; if(L2===0) continue;
    let t=((ball.x-a.x)*dx+(ball.y-a.y)*dy)/L2; t=Math.max(0,Math.min(1,t));
    const px=a.x+t*dx, py=a.y+t*dy;
    const d=Math.hypot(ball.x-px,ball.y-py);
    if(d<min) min=d;
  }
  return min;
}

// ---- audio: SFX blips + procedural background music ----
let actx=null;
let soundOn = localStorage.getItem('zigzy_sound')!=='off';   // default: on
function ensureAudio(){
  try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume(); }catch(e){}
}
function beep(freq,dur,type='sine',vol=0.05){
  if(!soundOn) return;
  try{
    ensureAudio(); if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

// Procedural loop: bass + arpeggio + kick + hats over Am–F–C–G
const Music=(()=>{
  let playing=false, timer=null, step=0, nextTime=0, bus=null, filt=null;
  let T=null, S=0;                           // current track + 16th-note duration
  function tone(freq,t,dur,type,vol){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(bus);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.03);
  }
  function kick(t){
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.11);
    g.gain.setValueAtTime(0.45,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o.connect(g); g.connect(bus); o.start(t); o.stop(t+0.18);
  }
  function hat(t,vol){
    const len=Math.floor(actx.sampleRate*0.025);
    const b=actx.createBuffer(1,len,actx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
    const s=actx.createBufferSource(); s.buffer=b;
    const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
    const g=actx.createGain(); g.gain.value=vol;
    s.connect(hp); hp.connect(g); g.connect(bus); s.start(t);
  }
  function schedule(){
    if(!playing) return;
    while(nextTime < actx.currentTime + 0.14){
      const bar=Math.floor(step/16)%4, inBar=step%16, root=T.roots[bar];
      const arpVol=(T.arp==='sine'||T.arp==='triangle')?0.06:0.045;
      if(inBar%4===0) tone(root/2, nextTime, 0.24, T.bass, 0.17);       // bass (quarters)
      if(inBar===0||inBar===8) kick(nextTime);                          // kick on beats 1 & 3
      if(inBar%2===0){                                                   // arpeggio (consonant tones)
        const tones=[root, root*1.5, root*2, root*3];
        tone(tones[step%tones.length], nextTime, 0.2, T.arp, arpVol);
      }
      if(inBar%2===1) hat(nextTime,0.05);                               // offbeat hats
      nextTime+=S; step++;
    }
    timer=setTimeout(schedule,25);
  }
  return {
    start(){
      if(playing) return; ensureAudio(); if(!actx) return;
      T=curTrack(); S=60/T.bpm/4;
      playing=true;
      filt=actx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=T.cutoff;
      bus=actx.createGain(); bus.gain.value=0.5;
      bus.connect(filt); filt.connect(actx.destination);
      step=0; nextTime=actx.currentTime+0.06; schedule();
    },
    restart(){ if(playing){ this.stop(); this.start(); } },
    stop(){
      playing=false; if(timer) clearTimeout(timer); timer=null;
      if(bus){ try{bus.disconnect();}catch(e){} bus=null; }
      if(filt){ try{filt.disconnect();}catch(e){} filt=null; }
    }
  };
})();

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*220+60;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:Math.random()*3+1.5});
  }
}

// ---- continue (revive) ----
const CONT_TIME=3000;
let contStart=0, contRAF=null;
function showContinueScreen(){
  if(state!=='dead') return;          // player may have already moved on
  $('contScore').textContent='Score '+score;
  $('continueScreen').classList.remove('hidden'); $('continueScreen').classList.add('show');
  document.body.classList.remove('show-hud');
  contStart=performance.now(); tickContinue();
}
function tickContinue(){
  const C=339.29, t=(performance.now()-contStart)/CONT_TIME, left=Math.max(0,1-t);
  $('contProg').style.strokeDashoffset=(C*(1-left)).toFixed(1);
  $('contNum').textContent=Math.ceil(left*3);
  if(t>=1){ giveUp(); return; }
  contRAF=requestAnimationFrame(tickContinue);
}
function stopContinueTick(){ if(contRAF) cancelAnimationFrame(contRAF); contRAF=null; }
function hideContinue(){ stopContinueTick(); $('continueScreen').classList.add('hidden'); $('continueScreen').classList.remove('show'); }
function giveUp(){ hideContinue(); showGameOver(); }
let reviveX=0, reviveY=0, reviveDir=1;
function captureRevive(){   // place revive with guaranteed runway before the next corner
  const RUNWAY=130;
  let best=1e9;
  for(let i=1;i<path.length;i++){
    const a=path[i-1], b=path[i], dx=b.x-a.x, dy=b.y-a.y, L2=dx*dx+dy*dy; if(L2===0) continue;
    const segLen=Math.sqrt(L2);
    const tProj=Math.max(0,Math.min(1,((ball.x-a.x)*dx+(ball.y-a.y)*dy)/L2));
    const px=a.x+tProj*dx, py=a.y+tProj*dy, d=Math.hypot(ball.x-px,ball.y-py);
    if(d<best){
      best=d;
      // sit back so ~RUNWAY px remain before the next corner (path[i]); clamp to segment start
      const tRev=Math.max(0, Math.min(tProj, 1 - RUNWAY/segLen));
      reviveX=a.x+tRev*dx; reviveY=a.y+tRev*dy; reviveDir=dx>=0?1:-1;
    }
  }
}
function doContinue(){
  hideContinue();
  continued++;
  ball.x=reviveX; ball.y=reviveY; ball.dir=reviveDir; ball.y_fall=0;
  camX=ball.x; camY=ball.y;            // snap camera so the ball doesn't fly in from outside
  trail=[]; particles=[]; reviveGrace=0.85; reviveSlow=REVIVE_SLOW; shake=0;
  document.body.classList.add('show-hud');
  state='playing';
  beep(880,0.1,'triangle',0.06);
  burst(ball.x,ball.y,'#ffffff',18);
}

function showGameOver(){
  totalGems += coins; saveShop();
  const isNew=score>best;
  if(isNew){ best=score; localStorage.setItem('zigzy_best',best); }
  // leaderboard: auto-track personal bests; prompt for a name once if none set yet
  if(score>0){
    if(playerName){
      if(isNew) submitScore(playerName, score);
      $('overName').classList.add('hidden');
      $('overLbMsg').textContent = isNew ? '🏆 Neuer Ranglisten-Rekord!' : '🏆 In der Rangliste';
      $('overLbMsg').classList.remove('hidden');
    } else {
      pendingScore=Math.max(pendingScore, best);
      $('overNameInput').value='';
      $('overName').classList.remove('hidden');
      $('overLbMsg').classList.add('hidden');
    }
  } else {
    $('overName').classList.add('hidden'); $('overLbMsg').classList.add('hidden');
  }
  $('finalScore').textContent=score;
  $('finalBest').textContent=best;
  $('finalCoins').textContent=coins;
  $('newBest').classList.toggle('hidden',!isNew);
  $('overScreen').classList.remove('hidden'); $('overScreen').classList.add('show');
  document.body.classList.remove('show-hud');
}

// ---- main loop ----
let lastT=performance.now();
function loop(now){
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.05)dt=0.05;
  update(dt); render();
  requestAnimationFrame(loop);
}

function update(dt){
  if(state==='playing'){
    speed=Math.min(MAX_SPEED, BASE_SPEED + score*0.8);
    if(reviveSlow>0){ speed*=0.45+0.55*(1-reviveSlow/REVIVE_SLOW); reviveSlow-=dt; }
    const d=DIRS[ball.dir];
    ball.x+=d.x*speed*dt; ball.y+=d.y*speed*dt;
    score=Math.max(score,Math.floor(ball.y/14));
    $('score').textContent=score;
    const za=Math.floor(score/ZONE_LEN);
    if(za>lastZone){ lastZone=za; showZoneBanner(THEMES[za%THEMES.length]); }

    extendPath();
    // gem collection
    for(const p of path){
      if(p.gem && !p.got && Math.hypot(p.x-ball.x,p.y-ball.y)<26){
        p.got=true; coins++; $('coinval').textContent=coins;
        burst(p.x,p.y,'#ff4e8a',14); beep(880,0.07,'triangle',0.05);
      }
    }
    // trail
    trail.push({x:ball.x,y:ball.y}); if(trail.length>26) trail.shift();
    // skin effects: emit particles
    const csfx=curSkin().fx;
    if(csfx==='sparkle' && Math.random()<0.6){
      particles.push({x:ball.x+(Math.random()-.5)*18, y:ball.y+(Math.random()-.5)*18,
        vx:(Math.random()-.5)*30, vy:(Math.random()-.5)*30, life:0.7, color:'#ffffff', r:Math.random()*2+1});
    } else if(csfx==='fire'){
      for(let k=0;k<2;k++) particles.push({x:ball.x+(Math.random()-.5)*10, y:ball.y,
        vx:(Math.random()-.5)*26, vy:-30-Math.random()*40, life:0.5,
        color:(Math.random()<.5?'#ff7a2e':'#ffd34e'), r:Math.random()*2.4+1});
    }
    // off-path? (brief grace right after a continue)
    if(reviveGrace>0){ reviveGrace-=dt; }
    else if(distToPath() > PATH_W/2){ die(); }
  } else if(state==='dead'){
    fall+=dt;
    ball.y -= 120*dt; // keep drifting along last dir while falling visually
    const d=DIRS[ball.dir];
    ball.x+=d.x*40*dt;
    ball.y_fall=(ball.y_fall||0)+ (380*dt); // fall down screen
  }
  // particles
  for(const pt of particles){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=400*dt; pt.life-=dt*1.6; }
  particles=particles.filter(p=>p.life>0);
  // camera
  const tcx=ball.x, tcy=ball.y;
  camX+=(tcx-camX)*Math.min(1,dt*8);
  camY+=(tcy-camY)*Math.min(1,dt*8);
  if(shake>0) shake=Math.max(0,shake-dt*40);
}

function worldToScreen(x,y){
  const sx=(x-camX)+W/2;
  const sy=H*0.62-(y-camY);
  return [sx,sy];
}

function render(){
  const cs=curSkin();
  const rainbow = cs.fx==='rainbow';
  const hue = (performance.now()/10)%360;
  const ballCol = rainbow ? `hsl(${hue},95%,60%)` : cs.ball;
  const tr = hexToRgb(cs.trail);
  let glow = 20;
  if(cs.fx==='glow') glow = 28 + Math.sin(performance.now()/180)*12;
  else if(cs.fx==='fire' || rainbow) glow = 26;
  const tc=themeColors();
  // background gradient (zone-driven)
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgb(${tc.bg1[0]},${tc.bg1[1]},${tc.bg1[2]})`);
  g.addColorStop(1,`rgb(${tc.bg2[0]},${tc.bg2[1]},${tc.bg2[2]})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // parallax dots
  ctx.fillStyle='rgba(255,255,255,.10)';
  for(const d of bgDots){
    const yy=(d.y + camY*d.s*0.1)%H;
    ctx.beginPath(); ctx.arc(d.x,(yy+H)%H,d.r,0,7); ctx.fill();
  }

  let shx=0,shy=0;
  if(shake>0){ shx=(Math.random()-.5)*shake; shy=(Math.random()-.5)*shake; }
  ctx.save(); ctx.translate(shx,shy);

  // path corridor
  if(path.length>1){
    ctx.lineCap='round'; ctx.lineJoin='round';
    // glow
    ctx.strokeStyle=`rgba(${tc.a[0]},${tc.a[1]},${tc.a[2]},.18)`; ctx.lineWidth=PATH_W+18;
    drawPath();
    // body (zone-driven gradient)
    const pg=ctx.createLinearGradient(0,0,W,H);
    pg.addColorStop(0,`rgb(${tc.a[0]},${tc.a[1]},${tc.a[2]})`);
    pg.addColorStop(1,`rgb(${tc.b[0]},${tc.b[1]},${tc.b[2]})`);
    ctx.strokeStyle=pg; ctx.lineWidth=PATH_W; drawPath();
    // inner line
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=3; drawPath();
  }

  // gems
  for(const p of path){
    if(p.gem&&!p.got){
      const [sx,sy]=worldToScreen(p.x,p.y);
      const t=performance.now()/300;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(t);
      ctx.fillStyle='#ff4e8a'; ctx.shadowColor='#ff4e8a'; ctx.shadowBlur=16;
      ctx.beginPath();
      for(let i=0;i<4;i++){const a=i/4*Math.PI*2; ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9);}
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }

  // trail
  for(let i=0;i<trail.length;i++){
    const [sx,sy]=worldToScreen(trail[i].x, trail[i].y + (state==='dead'?-(ball.y_fall||0):0));
    const a=i/trail.length;
    ctx.fillStyle = rainbow ? `hsla(${(hue+i*8)%360},95%,62%,${a*0.55})` : `rgba(${tr[0]},${tr[1]},${tr[2]},${a*0.5})`;
    ctx.beginPath(); ctx.arc(sx,sy,BALL_R*a*0.9,0,7); ctx.fill();
  }

  // ball
  const fallOff = state==='dead' ? (ball.y_fall||0) : 0;
  const [bx,by]=worldToScreen(ball.x, ball.y - fallOff);
  ctx.save();
  ctx.shadowColor=ballCol; ctx.shadowBlur=glow;
  ctx.fillStyle=ballCol;
  ctx.beginPath(); ctx.arc(bx,by,BALL_R,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(bx-4,by-4,4,0,7); ctx.fill();
  ctx.restore();

  // particles
  for(const pt of particles){
    const [sx,sy]=worldToScreen(pt.x, pt.y - (state==='dead'?(ball.y_fall||0)*0:0));
    ctx.globalAlpha=Math.max(0,pt.life);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(sx,sy,pt.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawPath(){
  ctx.beginPath();
  for(let i=0;i<path.length;i++){
    const [sx,sy]=worldToScreen(path[i].x,path[i].y);
    if(i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  ctx.stroke();
}

  const top=await fetchTop();
  if(!top){ el.innerHTML='<div class="lb-empty">Keine Verbindung 😕</div>'; return; }
  if(top.length===0){ el.innerHTML='<div class="lb-empty">Noch keine Scores — sei der Erste! 🥇</div>'; return; }
  el.innerHTML='';
  top.forEach((row,i)=>{
    const r=document.createElement('div'); r.className='lb-row'+(row.name===playerName?' me':'');
    r.innerHTML=`<span class="lb-rank">${i+1}</span><span class="lb-nm">${escapeHtml(row.name)}</span><span class="lb-sc">${row.score}</span>`;
    el.appendChild(r);
  });
}
async function saveName(){
  const v=$('nameInput').value.trim().slice(0,16);
  if(!v) return;
  playerName=v; localStorage.setItem('zigzy_name',v);
  if(pendingScore>0){ await submitScore(playerName,pendingScore); pendingScore=0; }
  else if(best>0){ await submitScore(playerName,best); }
  beep(660,0.06); loadLb();
}
$('lbBtnStart').addEventListener('click',e=>{e.stopPropagation();openLb('startScreen');});
$('lbBtnOver').addEventListener('click',e=>{e.stopPropagation();openLb('overScreen');});
$('lbClose').addEventListener('click',e=>{e.stopPropagation();closeLb();});
$('nameSave').addEventListener('click',e=>{e.stopPropagation();saveName();});
$('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); saveName(); } });

function saveOverName(){
  const v=$('overNameInput').value.trim().slice(0,16);
  if(!v) return;
  playerName=v; localStorage.setItem('zigzy_name',v);
  const sc=pendingScore>0?pendingScore:best;
  if(sc>0) submitScore(playerName, sc);
  pendingScore=0;
  $('overName').classList.add('hidden');
  $('overLbMsg').textContent='🏆 In der Rangliste eingetragen!';
  $('overLbMsg').classList.remove('hidden');
  beep(660,0.06);
}
$('overNameSave').addEventListener('click',e=>{e.stopPropagation();saveOverName();});
$('overNameInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); saveOverName(); } });

reset();
requestAnimationFrame(loop);

// PWA: register service worker for installability + offline
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
