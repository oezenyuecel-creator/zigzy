<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e0f1a">
<title>Zigzy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zigzy">
<style>
  :root{
    --bg1:#0e0f1a; --bg2:#161a2e;
    --path:#27e0c9; --path2:#1ba8d6;
    --ball:#ffd34e; --gem:#ff4e8a;
    --ink:#eef2ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg1);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  #game{display:block;width:100vw;height:100dvh;}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;text-align:center;color:var(--ink);
    padding:24px;pointer-events:none;}
  .overlay.show{pointer-events:auto;}
  .hidden{display:none!important;}
  .title{font-size:64px;font-weight:900;letter-spacing:-2px;
    background:linear-gradient(120deg,var(--path),var(--ball));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 6px 24px rgba(39,224,201,.35));}
  .sub{font-size:16px;opacity:.7;font-weight:600;}
  .big{font-size:88px;font-weight:900;letter-spacing:-3px;line-height:1;}
  .lbl{font-size:13px;letter-spacing:3px;opacity:.55;font-weight:700;text-transform:uppercase;}
  .row{display:flex;gap:28px;align-items:flex-end;}
  .stat{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .stat .v{font-size:40px;font-weight:800;}
  .btn{pointer-events:auto;margin-top:6px;border:none;cursor:pointer;
    font-size:18px;font-weight:800;color:#0e0f1a;
    background:linear-gradient(120deg,var(--path),#8ef7e6);
    padding:16px 40px;border-radius:999px;
    box-shadow:0 10px 30px rgba(39,224,201,.4);transition:transform .1s;}
  .btn:active{transform:scale(.94);}
  .btn.ghost{background:rgba(255,255,255,.08);color:var(--ink);box-shadow:none;}
  .hint{font-size:15px;opacity:.6;font-weight:600;display:flex;align-items:center;gap:8px;}
  .tap-anim{width:46px;height:46px;border-radius:50%;border:3px solid var(--ink);
    opacity:.0;animation:tap 1.6s infinite;}
  @keyframes tap{0%{transform:scale(.6);opacity:.0}30%{opacity:.8}60%{transform:scale(1.1);opacity:0}100%{opacity:0}}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;
    padding-top:max(18px,env(safe-area-inset-top));pointer-events:none;}
  #score{font-size:54px;font-weight:900;color:var(--ink);
    text-shadow:0 4px 18px rgba(0,0,0,.5);opacity:0;transition:opacity .2s;}
  #coins{position:fixed;top:max(22px,env(safe-area-inset-top));right:18px;
    display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px;color:var(--ball);
    opacity:0;transition:opacity .2s;}
  .show-hud #score,.show-hud #coins{opacity:1;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--gem);box-shadow:0 0 10px var(--gem);}
  .new{font-size:14px;font-weight:800;color:var(--ball);letter-spacing:1px;
    border:1.5px solid var(--ball);border-radius:999px;padding:4px 12px;}
  #soundBtn{position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;z-index:20;
    width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.08);color:#fff;font-size:20px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:transform .1s;}
  #soundBtn:active{transform:scale(.9);}
</style>
</head>
<body>
<canvas id="game"></canvas>

<button id="soundBtn" aria-label="Ton an/aus">🔊</button>
<div id="hud"><div id="score">0</div></div>
<div id="coins"><span class="dot"></span><span id="coinval">0</span></div>

<!-- Start screen -->
<div class="overlay show" id="startScreen">
  <div class="title">Zigzy</div>
  <div class="sub">Ein Tap. Bleib auf dem Pfad.</div>
  <button class="btn" id="playBtn">Spielen</button>
  <div class="hint"><div class="tap-anim"></div>Tippen = Richtung wechseln</div>
</div>

<!-- Game over screen -->
<div class="overlay hidden" id="overScreen">
  <div id="newBest" class="new hidden">NEUER REKORD! 🎉</div>
  <div class="lbl">Score</div>
  <div class="big" id="finalScore">0</div>
  <div class="row">
    <div class="stat"><div class="v" id="finalBest">0</div><div class="lbl">Best</div></div>
    <div class="stat"><div class="v" id="finalCoins">0</div><div class="lbl">Gems</div></div>
  </div>
  <button class="btn" id="retryBtn">Nochmal</button>
  <button class="btn ghost" id="shareBtn">Score teilen</button>
</div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); window.addEventListener('resize',resize);

// ---- Config ----
const SQRT2 = Math.SQRT2;
const DIRS = { 1:{x:1/SQRT2,y:1/SQRT2}, '-1':{x:-1/SQRT2,y:1/SQRT2} };
const PATH_W = 64;          // corridor width
const BALL_R = 13;
const BASE_SPEED = 250;     // px/sec
const MAX_SPEED = 560;
const SEG_MIN = 70, SEG_MAX = 230;

// ---- State ----
let state='ready';
let path=[];          // centerline points {x,y, gem:bool, got:bool, dir}
let lastDir=1;
let ball={x:0,y:0,dir:1};
let trail=[];
let particles=[];
let speed=BASE_SPEED;
let score=0, coins=0, best=+(localStorage.getItem('zigzy_best')||0);
let shake=0;
let fall=0;            // death fall animation
let bgDots=[];
let camX=0,camY=0;

const $=id=>document.getElementById(id);

function seedBgDots(){
  bgDots=[];
  for(let i=0;i<60;i++) bgDots.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.4,s:Math.random()*.4+.1});
}
seedBgDots();

function extendPath(){
  // ensure path has points well above the ball
  while(path.length<2 || path[path.length-1].y < ball.y + H*1.4){
    const last=path[path.length-1] || {x:0,y:-40};
    if(path.length===0){ path.push({x:0,y:-40,gem:false,got:false}); continue; }
    lastDir*=-1;
    const len=SEG_MIN+Math.random()*(SEG_MAX-SEG_MIN);
    const d=DIRS[lastDir];
    const np={x:last.x+d.x*len, y:last.y+d.y*len, gem:Math.random()<0.28, got:false};
    path.push(np);
  }
  // prune behind
  while(path.length>3 && path[1].y < ball.y - H){ path.shift(); }
}

function reset(){
  path=[]; lastDir=1; ball={x:0,y:0,dir:1};
  trail=[]; particles=[]; speed=BASE_SPEED; score=0; coins=0; shake=0; fall=0;
  camX=0; camY=0;
  // ball starts EXACTLY on the centerline; first segment runs in ball.dir (=1)
  path.push({x:0,y:0,gem:false,got:false});
  const d=DIRS[1];
  path.push({x:d.x*170,y:d.y*170,gem:false,got:false}); lastDir=1;
  extendPath();
}

function startGame(){
  reset();
  state='playing';
  $('startScreen').classList.remove('show'); $('startScreen').classList.add('hidden');
  $('overScreen').classList.add('hidden'); $('overScreen').classList.remove('show');
  document.body.classList.add('show-hud');
  if(soundOn) Music.start();
}

function tap(){
  if(state==='ready'){ startGame(); return; }
  if(state==='playing'){ ball.dir*=-1; beep(560,0.04); }
}

// ---- nearest distance from ball to centerline (check nearby segments) ----
function distToPath(){
  let min=1e9;
  for(let i=1;i<path.length;i++){
    const a=path[i-1], b=path[i];
    const dx=b.x-a.x, dy=b.y-a.y;
    const L2=dx*dx+dy*dy; if(L2===0) continue;
    let t=((ball.x-a.x)*dx+(ball.y-a.y)*dy)/L2; t=Math.max(0,Math.min(1,t));
    const px=a.x+t*dx, py=a.y+t*dy;
    const d=Math.hypot(ball.x-px,ball.y-py);
    if(d<min) min=d;
  }
  return min;
}

// ---- audio: SFX blips + procedural background music ----
let actx=null;
let soundOn = localStorage.getItem('zigzy_sound')!=='off';   // default: on
function ensureAudio(){
  try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume(); }catch(e){}
}
function beep(freq,dur,type='sine',vol=0.05){
  if(!soundOn) return;
  try{
    ensureAudio(); if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

// Procedural loop: bass + arpeggio + kick + hats over Am–F–C–G
const Music=(()=>{
  let playing=false, timer=null, step=0, nextTime=0, bus=null, filt=null;
  const BPM=112, S=60/BPM/4;                 // duration of a 16th note
  const roots=[220.00,174.61,261.63,196.00]; // A, F, C, G (one per bar)
  function tone(freq,t,dur,type,vol){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(bus);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.03);
  }
  function kick(t){
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.11);
    g.gain.setValueAtTime(0.45,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o.connect(g); g.connect(bus); o.start(t); o.stop(t+0.18);
  }
  function hat(t,vol){
    const len=Math.floor(actx.sampleRate*0.025);
    const b=actx.createBuffer(1,len,actx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
    const s=actx.createBufferSource(); s.buffer=b;
    const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
    const g=actx.createGain(); g.gain.value=vol;
    s.connect(hp); hp.connect(g); g.connect(bus); s.start(t);
  }
  function schedule(){
    if(!playing) return;
    while(nextTime < actx.currentTime + 0.14){
      const bar=Math.floor(step/16)%4, inBar=step%16, root=roots[bar];
      if(inBar%4===0) tone(root/2, nextTime, 0.24, 'triangle', 0.17);   // bass (quarters)
      if(inBar===0||inBar===8) kick(nextTime);                          // kick on beats 1 & 3
      if(inBar%2===0){                                                   // arpeggio (consonant tones)
        const tones=[root, root*1.5, root*2, root*3];
        tone(tones[step%tones.length], nextTime, 0.2, 'triangle', 0.06);
      }
      if(inBar%2===1) hat(nextTime,0.05);                               // offbeat hats
      nextTime+=S; step++;
    }
    timer=setTimeout(schedule,25);
  }
  return {
    start(){
      if(playing) return; ensureAudio(); if(!actx) return;
      playing=true;
      filt=actx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=3200;
      bus=actx.createGain(); bus.gain.value=0.5;
      bus.connect(filt); filt.connect(actx.destination);
      step=0; nextTime=actx.currentTime+0.06; schedule();
    },
    stop(){
      playing=false; if(timer) clearTimeout(timer); timer=null;
      if(bus){ try{bus.disconnect();}catch(e){} bus=null; }
      if(filt){ try{filt.disconnect();}catch(e){} filt=null; }
    }
  };
})();

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*220+60;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:Math.random()*3+1.5});
  }
}

function die(){
  state='dead';
  shake=18; fall=0;
  burst(ball.x,ball.y,'#ff5b7a',26);
  beep(180,0.25,'sawtooth',0.06);
  setTimeout(showGameOver,650);
}

function showGameOver(){
  const isNew=score>best;
  if(isNew){ best=score; localStorage.setItem('zigzy_best',best); }
  $('finalScore').textContent=score;
  $('finalBest').textContent=best;
  $('finalCoins').textContent=coins;
  $('newBest').classList.toggle('hidden',!isNew);
  $('overScreen').classList.remove('hidden'); $('overScreen').classList.add('show');
  document.body.classList.remove('show-hud');
}

// ---- main loop ----
let lastT=performance.now();
function loop(now){
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.05)dt=0.05;
  update(dt); render();
  requestAnimationFrame(loop);
}

function update(dt){
  if(state==='playing'){
    speed=Math.min(MAX_SPEED, BASE_SPEED + score*1.4);
    const d=DIRS[ball.dir];
    ball.x+=d.x*speed*dt; ball.y+=d.y*speed*dt;
    score=Math.max(score,Math.floor(ball.y/14));
    $('score').textContent=score;

    extendPath();
    // gem collection
    for(const p of path){
      if(p.gem && !p.got && Math.hypot(p.x-ball.x,p.y-ball.y)<26){
        p.got=true; coins++; $('coinval').textContent=coins;
        burst(p.x,p.y,'#ff4e8a',14); beep(880,0.07,'triangle',0.05);
      }
    }
    // trail
    trail.push({x:ball.x,y:ball.y}); if(trail.length>26) trail.shift();
    // off-path?
    if(distToPath() > PATH_W/2){ die(); }
  } else if(state==='dead'){
    fall+=dt;
    ball.y -= 120*dt; // keep drifting along last dir while falling visually
    const d=DIRS[ball.dir];
    ball.x+=d.x*40*dt;
    ball.y_fall=(ball.y_fall||0)+ (380*dt); // fall down screen
  }
  // particles
  for(const pt of particles){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=400*dt; pt.life-=dt*1.6; }
  particles=particles.filter(p=>p.life>0);
  // camera
  const tcx=ball.x, tcy=ball.y;
  camX+=(tcx-camX)*Math.min(1,dt*8);
  camY+=(tcy-camY)*Math.min(1,dt*8);
  if(shake>0) shake=Math.max(0,shake-dt*40);
}

function worldToScreen(x,y){
  const sx=(x-camX)+W/2;
  const sy=H*0.62-(y-camY);
  return [sx,sy];
}

function render(){
  // background gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#161a2e'); g.addColorStop(1,'#0b0c16');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // parallax dots
  ctx.fillStyle='rgba(255,255,255,.10)';
  for(const d of bgDots){
    const yy=(d.y + camY*d.s*0.1)%H;
    ctx.beginPath(); ctx.arc(d.x,(yy+H)%H,d.r,0,7); ctx.fill();
  }

  let shx=0,shy=0;
  if(shake>0){ shx=(Math.random()-.5)*shake; shy=(Math.random()-.5)*shake; }
  ctx.save(); ctx.translate(shx,shy);

  // path corridor
  if(path.length>1){
    ctx.lineCap='round'; ctx.lineJoin='round';
    // glow
    ctx.strokeStyle='rgba(39,224,201,.18)'; ctx.lineWidth=PATH_W+18;
    drawPath();
    // body
    const pg=ctx.createLinearGradient(0,0,W,H);
    pg.addColorStop(0,'#27e0c9'); pg.addColorStop(1,'#1ba8d6');
    ctx.strokeStyle=pg; ctx.lineWidth=PATH_W; drawPath();
    // inner line
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=3; drawPath();
  }

  // gems
  for(const p of path){
    if(p.gem&&!p.got){
      const [sx,sy]=worldToScreen(p.x,p.y);
      const t=performance.now()/300;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(t);
      ctx.fillStyle='#ff4e8a'; ctx.shadowColor='#ff4e8a'; ctx.shadowBlur=16;
      ctx.beginPath();
      for(let i=0;i<4;i++){const a=i/4*Math.PI*2; ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9);}
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }

  // trail
  for(let i=0;i<trail.length;i++){
    const [sx,sy]=worldToScreen(trail[i].x, trail[i].y + (state==='dead'?-(ball.y_fall||0):0));
    const a=i/trail.length;
    ctx.fillStyle=`rgba(255,211,78,${a*0.5})`;
    ctx.beginPath(); ctx.arc(sx,sy,BALL_R*a*0.9,0,7); ctx.fill();
  }

  // ball
  const fallOff = state==='dead' ? (ball.y_fall||0) : 0;
  const [bx,by]=worldToScreen(ball.x, ball.y - fallOff);
  ctx.save();
  ctx.shadowColor='#ffd34e'; ctx.shadowBlur=20;
  ctx.fillStyle='#ffd34e';
  ctx.beginPath(); ctx.arc(bx,by,BALL_R,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(bx-4,by-4,4,0,7); ctx.fill();
  ctx.restore();

  // particles
  for(const pt of particles){
    const [sx,sy]=worldToScreen(pt.x, pt.y - (state==='dead'?(ball.y_fall||0)*0:0));
    ctx.globalAlpha=Math.max(0,pt.life);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(sx,sy,pt.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawPath(){
  ctx.beginPath();
  for(let i=0;i<path.length;i++){
    const [sx,sy]=worldToScreen(path[i].x,path[i].y);
    if(i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  ctx.stroke();
}

// ---- input ----
function onTap(e){ e.preventDefault(); tap(); }
cv.addEventListener('pointerdown',onTap);
window.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();tap();}});

const soundBtn=$('soundBtn');
function updateSoundUI(){ soundBtn.textContent=soundOn?'🔊':'🔇'; }
updateSoundUI();
soundBtn.addEventListener('click',e=>{
  e.stopPropagation();
  soundOn=!soundOn;
  localStorage.setItem('zigzy_sound',soundOn?'on':'off');
  updateSoundUI();
  if(soundOn){ ensureAudio(); Music.start(); } else { Music.stop(); }
});

$('playBtn').addEventListener('click',e=>{e.stopPropagation();startGame();});
$('retryBtn').addEventListener('click',e=>{e.stopPropagation();startGame();});
$('shareBtn').addEventListener('click',async e=>{
  e.stopPropagation();
  const text=`Ich hab ${best} Punkte in Zigzy! 🟡 Schlag meinen Score 👉`;
  try{
    if(navigator.share){ await navigator.share({title:'Zigzy',text}); }
    else { await navigator.clipboard.writeText(text); $('shareBtn').textContent='Kopiert! ✓'; }
  }catch(err){}
});

reset();
requestAnimationFrame(loop);

// PWA: register service worker for installability + offline
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
